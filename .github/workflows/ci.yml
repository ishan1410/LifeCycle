name: Go CI pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Dependency tidy
      run: go mod tidy

    - name: Format
      run: if [ "$(go fmt ./... | wc -l)" -gt 0 ]; then echo "Format check failed"; exit 1; fi

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v -race ./...

    - name: Build
      run: go build -v ./cmd/server
